<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazaar 交易系统演示</title>
    <!-- 极简 Bootstrap 风格 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h3>🛒 Bazaar-Trade 认证测试</h3>
                </div>
                <div class="card-body">
                    <!-- 注册/登录切换 -->
                    <ul class="nav nav-tabs" id="myTab" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button">登录</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button">注册</button>
                        </li>
                    </ul>
                    <div class="tab-content pt-3" id="myTabContent">
                        <!-- 登录 Tab -->
                        <div class="tab-pane fade show active" id="login" role="tabpanel">
                            <div class="mb-3">
                                <label>手机号</label>
                                <input id="loginPhone" class="form-control" value="13800138000">
                            </div>
                            <div class="mb-3">
                                <label>密码</label>
                                <input id="loginPwd" class="form-control" type="password" value="123456">
                            </div>
                            <button class="btn btn-success w-100" onclick="handleLogin()">登录</button>
                        </div>
                        <!-- 注册 Tab -->
                        <div class="tab-pane fade" id="register" role="tabpanel">
                            <div class="mb-3">
                                <label>手机号</label>
                                <input id="regPhone" class="form-control" placeholder="请输入手机号">
                            </div>
                            <div class="mb-3">
                                <label>密码</label>
                                <input id="regPwd" class="form-control" type="password" placeholder="请设置密码">
                            </div>
                            <button class="btn btn-primary w-100" onclick="handleRegister()">注册</button>
                        </div>
                    </div>

                    <hr>
                    <!-- 查询信息 -->
                    <div class="mt-3">
                        <button class="btn btn-info w-100" onclick="handleGetInfo()">🔑 获取当前用户信息（需携带Token）</button>
                        <div id="resultArea" class="mt-3 p-2 bg-white border rounded" style="min-height: 60px; white-space: pre-wrap; word-break: break-all;">
                            <small class="text-muted">操作结果将显示在这里...</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
